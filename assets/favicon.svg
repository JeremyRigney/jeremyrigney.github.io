<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Partial solar eclipse — a crescent Sun">
  <defs>
    <radialGradient id="fav-sky" cx="50%" cy="40%" r="72%">
      <stop offset="0%" stop-color="#241d3a" />
      <stop offset="100%" stop-color="#140f22" />
    </radialGradient>
    <radialGradient id="fav-sun" cx="36%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#fff1d8" />
      <stop offset="42%" stop-color="#ffd79a" />
      <stop offset="74%" stop-color="#f0a052" />
      <stop offset="100%" stop-color="#e8863f" />
    </radialGradient>
    <mask id="fav-crescent">
      <rect width="32" height="32" fill="#000" />
      <circle cx="16" cy="16.5" r="9.4" fill="#fff" />
      <circle cx="21.4" cy="12.2" r="8.7" fill="#000" />
    </mask>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#fav-sky)" />
  <circle cx="16" cy="16.5" r="11" fill="#e8863f" opacity="0.18" />
  <circle cx="16" cy="16.5" r="9.4" fill="url(#fav-sun)" mask="url(#fav-crescent)" />
</svg>
